name: Log Workout

# Triggered by the iOS Shortcut via the GitHub repository_dispatch API.
# Accepts any workout type — Running, Stair Climbing, Cycling, MTB, etc.
# The Shortcut sends event_type "log-workout" with workout data in client_payload.

on:
  repository_dispatch:
    types: [log-run, log-stair, log-workout]

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Append workout log entry
        env:
          EVENT:    ${{ github.event.action }}
          DATE:     ${{ github.event.client_payload.date }}
          TYPE:     ${{ github.event.client_payload.type }}
          DURATION: ${{ github.event.client_payload.duration }}
          KM:       ${{ github.event.client_payload.km }}
          KCAL:     ${{ github.event.client_payload.kcal }}
        run: |
          # Normalise date: extract yyyy-MM-dd from whatever format the shortcut sends
          CLEAN_DATE=$(python3 -c "
import re, sys
from datetime import datetime
s = sys.argv[1].strip()
m = re.search(r'\d{4}-\d{2}-\d{2}', s)
if m:
    print(m.group())
else:
    for fmt in ['%d %b %Y at %H:%M', '%d %b %Y at %I:%M %p', '%d %b %Y', '%b %d, %Y', '%Y-%m-%dT%H:%M:%S']:
        try:
            print(datetime.strptime(s, fmt).strftime('%Y-%m-%d')); break
        except: pass
    else:
        print(s)
" "$DATE" 2>/dev/null || echo "$DATE")

          # Round kcal to whole number
          CLEAN_KCAL=$(printf "%.0f" "${KCAL:-0}" 2>/dev/null || echo "${KCAL:-0}")

          # Convert duration: if >300 assume it's in seconds, divide by 60; otherwise treat as minutes
          RAW_DUR="${DURATION:-0}"
          CLEAN_DUR=$(python3 -c "
d = float('${RAW_DUR}') if '${RAW_DUR}' else 0
print(round(d / 60) if d > 300 else round(d))
" 2>/dev/null || printf "%.0f" "${RAW_DUR:-0}")

          if [ "$EVENT" = "log-run" ]; then
            ENTRY="${CLEAN_DATE} | run | ${CLEAN_DUR} min | ${KM} km | ${CLEAN_KCAL} kcal"
            LABEL="log-run"
          elif [ "$EVENT" = "log-stair" ]; then
            ENTRY="${CLEAN_DATE} | stair | ${CLEAN_DUR} min | ${CLEAN_KCAL} kcal"
            LABEL="log-stair"
          else
            ENTRY="${CLEAN_DATE} | workout | ${TYPE} | ${CLEAN_DUR} min | ${CLEAN_KCAL} kcal"
            LABEL="log-workout (${TYPE})"
          fi

          echo "Appending: $ENTRY"
          echo "$ENTRY" >> logs/phone-log.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/phone-log.md
          git commit -m "log: ${LABEL} for ${DATE}"
          git push
