<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Clearing cache…</title></head>
<body>
<p style="font-family:sans-serif;color:#aaa;padding:24px">Clearing cache and reloading…</p>
<script>
(async function() {
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    var keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  } catch(e) {}
  location.replace('./index.html');
})();
</script>
</body>
</html>
